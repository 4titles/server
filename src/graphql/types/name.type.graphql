type Name {
    id: ID!
    imdbId: String!
    displayName: String!
    alternateNames: [String!]
    birthYear: Int
    birthLocation: String
    deathYear: Int
    deathLocation: String
    deadReason: String
    avatars: [Avatar]
    credits: [Credit]
    knownFor: [Title]
    createdAt: DateTime!
    updatedAt: DateTime!
}

type NameList {
    items: [Name!]!
    totalCount: Int!
}
