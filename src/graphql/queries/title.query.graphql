type Query {
    # Single title queries
    titleById(id: ID!): Title
    titleByImdbId(imdbId: String!): Title

    # Multiple titles queries
    titles(ids: [String!], type: TitleType): [Title!]!

    # Specific type queries
    movies: [Title!]!
    tvSeries: [Title!]!
    tvMiniSeries: [Title!]!

    # Name queries
    nameById(id: ID!): Name
    nameByImdbId(imdbId: String!): Name
    namesByImdbIds(imdbIds: [String!]!): [Name!]!
    names(skip: Int = 0, take: Int = 50): NameList!
}
