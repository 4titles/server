type Title {
    id: ID!
    titleName: String!
    imdbid: String!
    type: TitleType!
    rank: Int
    image: String
    description: String
    genre: [String!]!
    rating: Float
    imdbLink: String
    year: String
    createdAt: String
    updatedAt: String
}

enum TitleType {
    MOVIE
    TV_SERIES
}

type Query {
    titles(type: TitleType): [Title]
    movies: [Title]
    tvSeries: [Title]
}

type Mutation {
    refreshTitlesCache: Boolean
}
